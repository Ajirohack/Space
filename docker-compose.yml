version: '3.8'

services:
  backend:
    build: 
      context: ./backend/mis-api
      dockerfile: Dockerfile
    ports:
      - "3101:3000"
    volumes:
      - ./backend/mis-api:/app
    environment:
      - PYTHONPATH=/app
      - SUPABASE_URL=${SUPABASE_URL:-http://localhost:8000}
      - SUPABASE_KEY=${SUPABASE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dev-key-for-testing}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dev-service-key-for-testing}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-StrongPassword123!}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-2525}
      - SMTP_USER=${SMTP_USER:-test}
      - SMTP_PASS=${SMTP_PASS:-test}
      - SITE_URL=${SITE_URL:-http://localhost:3101}
      - OPERATOR_TOKEN=${OPERATOR_TOKEN:-dev-operator-token}
      - DEBUG=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 3000 --reload

  frontend:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    image: node:20.11.1-slim
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/dashboard:/app
      - ./shared:/shared
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3101
      - VITE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 3s
      retries: 3

  extension-dev:
    image: node:20.11.1-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./sidebar-extension:/app
      - ./shared:/shared
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:3101
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
      
volumes:
  ollama_data: